<!doctype html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/modern.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='assets/favicon.png') }}">
    <title>{% block pagetitle %}PlantAI{% endblock pagetitle %}</title>
</head>

<body class="d-flex flex-column min-vh-100">
    <!-- Floating Leaves Background -->
    <div class="bg-leaves">
        <div class="leaf-shape" style="width: 300px; height: 300px; top: -50px; left: -50px;"></div>
        <div class="leaf-shape" style="width: 250px; height: 250px; bottom: 10%; right: -50px; animation-delay: -5s;">
        </div>
        <div class="leaf-shape" style="width: 200px; height: 200px; top: 40%; left: 80%; animation-delay: -10s;"></div>

        <!-- Animated Dropping Leaves (Reduced Intensity) -->
        <div class="leaf-drift" style="left: 15%; animation-delay: 0s;"></div>
        <div class="leaf-drift" style="left: 45%; animation-delay: 6s;"></div>
        <div class="leaf-drift" style="left: 75%; animation-delay: 3s;"></div>
        <div class="leaf-drift" style="left: 90%; animation-delay: 10s;"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <div class="logo-container me-2">
                    <div class="logo-orb"></div>
                    <i class="fas fa-leaf logo-icon"></i>
                </div>
                <span class="brand-text">Agri<span class="text-primary">Crop</span></span>
            </a>

            <div class="d-flex align-items-center order-lg-3">
                <div class="theme-toggle me-3" id="theme-toggle">
                    <i class="fas fa-moon"></i>
                </div>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon-custom">
                        <span></span>
                        <span></span>
                    </span>
                </button>
            </div>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/index">Crop Doctor</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/market">Supplements</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/contact">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3" href="/history">
                            <i class="fas fa-history me-1 text-success"></i>History
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="flex-grow-1">
        {% block body %}
        {% endblock body %}
    </main>

    <!-- Footer -->
    <footer class="footer mt-auto py-5 glass border-0 rounded-0" style="position: relative; z-index: 100;">
        <div class="container">
            <div class="row align-items-center g-4">
                <div class="col-md-4 text-center text-md-start">
                    <div class="weather-widget footer-widget d-inline-flex">
                        <i class="fas fa-temperature-low weather-icon me-2" id="footer-weather-icon"></i>
                        <div class="text-start">
                            <span class="weather-temp" id="footer-temp">--°C</span>
                            <div class="small text-muted fw-600">Jalgaon Live</div>
                        </div>
                    </div>
                </div>
                <div class="col-md-4 text-center">
                    <div class="social">
                        <a href="https://www.instagram.com/krixhn.09/" target="_blank" rel="noopener noreferrer"
                            class="btn btn-social mx-2">
                            <i class="fab fa-instagram fa-lg"></i>
                        </a>
                        <a href="https://www.linkedin.com/in/krushna-badgujar-09/" target="_blank"
                            rel="noopener noreferrer" class="btn btn-social mx-2">
                            <i class="fab fa-linkedin fa-lg"></i>
                        </a>
                        <a href="mailto:krushnabadgujar613@gmail.com" class="btn btn-social mx-2">
                            <i class="fas fa-envelope fa-lg"></i>
                        </a>
                    </div>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <p class="text-muted small mb-0">© 2026 PlantAI Intelligence</p>
                    <div class="small text-primary fw-600">Jalgaon, Maharashtra</div>
                </div>
            </div>

            <div class="text-center mt-4">
                <ul class="list-inline mb-0">
                    <li class="list-inline-item mx-2"><a href="/"
                            class="small text-decoration-none text-secondary">Home</a></li>
                    <li class="list-inline-item mx-2"><a href="/market"
                            class="small text-decoration-none text-secondary">Supplements</a></li>
                    <li class="list-inline-item mx-2"><a href="/contact"
                            class="small text-decoration-none text-secondary">Contact</a></li>
                </ul>
            </div>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Theme Toggle Logic
        const themeToggle = document.getElementById('theme-toggle');
        const themeIcon = themeToggle.querySelector('i');
        const html = document.documentElement;

        // Load saved theme
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-theme', savedTheme);
        updateIcon(savedTheme);

        themeToggle.addEventListener('click', () => {
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcon(newTheme);
        });

        function updateIcon(theme) {
            themeIcon.className = theme === 'light' ? 'fas fa-moon' : 'fas fa-sun';
        }

        // Intersection Observer for Reveal Animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => observer.observe(el));

        // Stagger animations for cards
        document.querySelectorAll('.dashboard-grid .card').forEach((card, index) => {
            card.className += ' stagger-in';
            card.style.animationDelay = `${index * 0.1}s`;
        });

        // Footer Weather Script
        async function fetchFooterWeather() {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=21.0077&longitude=75.5626&current_weather=true`);
                const data = await response.json();
                if (data.current_weather) {
                    const temp = Math.round(data.current_weather.temperature);
                    const tempEl = document.getElementById('footer-temp');
                    if (tempEl) tempEl.textContent = `${temp}°C`;
                }
            } catch (e) { }
        }
        window.addEventListener('load', fetchFooterWeather);
    </script>
</body>

</html>
